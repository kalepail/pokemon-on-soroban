<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pokemon on Soroban | Real-Time Pocket Monster Arena</title>
    <meta
      name="description"
      content="Play Pokemon on Soroban, a retro browser game prototype with real-time multiplayer battles, creature collecting, and a Stellar/Soroban on-chain design path."
    />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#16121d" />
    <link rel="canonical" href="https://team4.stellar.buzz/" />
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/favicon.png" />
    <link rel="apple-touch-icon" href="/assets/favicon.png" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Pokemon on Soroban" />
    <meta property="og:title" content="Pokemon on Soroban | Real-Time Pocket Monster Arena" />
    <meta
      property="og:description"
      content="A playable retro creature-battle prototype with server-authoritative multiplayer, browser minigames, and a concrete Soroban game design."
    />
    <meta property="og:url" content="https://team4.stellar.buzz/" />
    <meta property="og:image" content="https://team4.stellar.buzz/assets/og-image.png" />
    <meta property="og:image:width" content="1731" />
    <meta property="og:image:height" content="909" />
    <meta property="og:image:alt" content="Pixel-art creature battle arena for Pokemon on Soroban" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pokemon on Soroban | Real-Time Pocket Monster Arena" />
    <meta
      name="twitter:description"
      content="Play a retro pocket monster arena and explore how the mechanics map to Soroban."
    />
    <meta name="twitter:image" content="https://team4.stellar.buzz/assets/og-image.png" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "Pokemon on Soroban",
        "url": "https://team4.stellar.buzz/",
        "image": "https://team4.stellar.buzz/assets/og-image.png",
        "description": "A retro browser game prototype with real-time multiplayer pocket monster battles, creature collecting, and a Stellar/Soroban on-chain design path.",
        "applicationCategory": "Game",
        "operatingSystem": "Web browser",
        "playMode": ["SinglePlayer", "MultiPlayer"],
        "genre": ["Arcade", "Role-playing", "Creature collector"]
      }
    </script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hud hud-left">
        <div class="brand">Pokémon Pocket Clash</div>
        <div class="metric"><span>Status</span><strong id="status">connecting</strong></div>
        <div class="metric metric-meta"><span>Trainer</span><strong id="ship">--</strong></div>
        <div class="metric metric-meta"><span>Pokémon</span><strong id="ships">0</strong></div>
        <div class="metric"><span>Score</span><strong id="score">0</strong></div>
      </section>

      <canvas id="arena" aria-label="Pokémon Pocket Clash battle field"></canvas>

      <aside class="hud hud-right">
        <div class="panel-title">Trainer Board</div>
        <ol id="leaderboard"></ol>
      </aside>

      <nav class="game-links" aria-label="Playable games">
        <a href="/pokemon/" title="Play Pokemon">Pokemon</a>
        <a href="/snake/" title="Play Snake">Snake</a>
      </nav>

      <section class="touch-controls" aria-label="Touch controls">
        <div class="stick-zone" id="stick-zone" aria-label="Move joystick">
          <div class="stick-base">
            <div class="stick-knob" id="stick-knob"></div>
          </div>
        </div>
        <button class="fire-button" id="fire-button" type="button" aria-label="Throw Poké Ball">Throw</button>
      </section>

      <section class="death-modal" id="death-modal" hidden>
        <div class="death-panel" role="dialog" aria-modal="true" aria-labelledby="death-title">
          <div class="panel-title" id="death-title">You Fainted</div>
          <div class="death-score">Score <strong id="death-score">0</strong></div>
          <button class="respawn-button" id="respawn-button" type="button">Heal Up</button>
        </div>
      </section>
    </main>

    <script type="module" src="/client.js"></script>
  </body>
</html>
